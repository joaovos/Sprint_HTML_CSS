<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="../anexo_desafio_htmlcss/css/style.css">

    <title>FORD</title>
</head>

<body>

    <header class="cabeçalho">
        <img class="img-logo-1" src="../anexo_desafio_htmlcss/img/logo-ford-256.png" alt="Logo Ford">
        <nav class="menu-principal">
            <ul class="botões-menu">
                <li><a href="./index.html">Home</a></li>
                <li><a href="./lançamento.html">Lançamento</a></li>
                <li><a href="./contato.html">Contato</a></li>
            </ul>
        </nav>
    </header>

    <main>
        <div class="div-main-lançamento">
            <iframe width="560" height="315" src="https://www.youtube.com/embed/vQsryuNmsL0?si=3LqnELI55kdScU3Q"
                title="YouTube video player" frameborder="0"
                allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture; web-share"
                referrerpolicy="strict-origin-when-cross-origin" allowfullscreen></iframe>
        </div>
        <br>
        <div class="div-img-modelo">
            <figure>
                <img src="../anexo_desafio_htmlcss/img/storm.jpg" alt="Storm Ford">
                <div class="div-figure">
                    <input type="checkbox" id="aceito" name="termos" value="sim">
                    <figcaption> XL Cabine Simples 2.2 Diesel 4X4 MT 2022 <br>
                        Preço Sugerido: R$ 183.850</figcaption>
                    <img class="img-info" src="../anexo_desafio_htmlcss/img/info.png" alt="Informações">
                </div>
            </figure>
            <figure>
                <img src="../anexo_desafio_htmlcss/img/XL Cabine.jpg" alt="XL Cabine">

                <div class="div-figure">
                    <input type="checkbox" id="aceito" name="termos" value="sim">
                    <figcaption> XLS 2.2 Diesel 4X4 AT 2022 <br>
                        Preço Sugerido: R$ 220.690</figcaption>
                    <img class="img-info" src="../anexo_desafio_htmlcss/img/info.png" alt="Informações">
                </div>
            </figure>
            <figure>
                <img src="../anexo_desafio_htmlcss/img/xls 2.2 diesel.jpg" alt="XLS 2.2 Diesel">
                <div class="div-figure">
                    <input type="checkbox" id="aceito" name="termos" value="sim">
                    <figcaption> Storm 3.2 Diesel 4X4 AT 2022 <br>
                        Preço Sugerido: R$ 222.790</figcaption>
                    <img class="img-info" src="../anexo_desafio_htmlcss/img/info.png" alt="Informações">
                </div>
            </figure>
        </div>
        <br>
        <button class="botao-formulario" type="submit">Comparar</button>
    </main>

    <footer class="rodape">
        <div class="div-rodape">
            <p class="titulo-rodape">Redes Sociais:</p>
            <a href="https://www.facebook.com/FordBrasil/" target="_blank">
                <img class="icone-redes-sociais" src="../anexo_desafio_htmlcss/img/facebook-50.png" alt="Logo facebook">
            </a>
            <a href="https://www.youtube.com/fordbrasil" target="_blank">
                <img class="icone-redes-sociais" src="../anexo_desafio_htmlcss/img/youtube-squared-50.png"
                    alt="Logo youtube">
            </a>
            <a href="https://www.instagram.com/fordbrasil/" target="_blank">
                <img class="icone-redes-sociais" src="../anexo_desafio_htmlcss/img/instagram-logo-50.png"
                    alt="Logo instagram">
            </a>

            <p class="titulo-rodape">&copy; Todos os direitos reservados.</p>
        </div>
        <img class="img-logo-2" src="../anexo_desafio_htmlcss/img/ford-96.png" alt="Logo Ford 2">

    </footer>

</body>

</html>
